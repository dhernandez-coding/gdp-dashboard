version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: react-dashboard/backend/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ..:/app
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - DATA_PATH=/app/data
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always
